<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Dot Memory</title>

  <script src="https://unpkg.com/jspsych@7.3.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.1.2"></script>

  <link href="https://unpkg.com/jspsych@7.3.2/css/jspsych.css" rel="stylesheet" />

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 5px;
      justify-content: center;
      margin: 20px auto;
    }

    .cell {
      width: 60px;
      height: 60px;
      border: 1px solid black;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      cursor: pointer;
      user-select: none;
    }

    .distraction-cell {
      width: 60px;
      height: 60px;
      border: none;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      cursor: pointer;
      user-select: none;
    }

    .circle {
      width: 35px;
      height: 35px;
      background: red;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #done {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      font-size: 20px;
    }

    .jspsych-btn {
      font-size: 20px;
      padding: 10px 20px;
    }
  </style>
</head>
<body></body>

<script>
  const jsPsych = initJsPsych({
    on_finish: function () {
      console.log(jsPsych.data.get().values());
    }
  });

  const subject_id = jsPsych.randomization.randomID(10);
  const filename = `${subject_id}.csv`;

  let participant_id = "";
  let encoding_positions = [];
  let userSelections = [];
  let fClickCount = 0;

  const predefinedEncodingPositions = [
    [[4,0],[3,1],[2,2]],
    [[4,2],[4,3],[4,4]],
    [[1,0],[1,1],[2,2]],
    [[0,0],[1,1],[3,3]],
    [[2,0],[2,4],[4,2]]
  ];

  let currentSetIndex = 0;

  const fullscreen = {
    type: jsPsychFullscreen,
    message: '<p style="font-size: 24px;">全画表示に切り替えます</p>',
    button_label: "開始",
    fullscreen_mode: true
  };

  const form_trial = {
    type: jsPsychSurveyText,
    questions: [
      {
        prompt: '<p style="font-size: 24px;">参加者IDを入力してください</p>',
        name: "ID",
        required: true
      }
    ],
    button_label: "次へ",
    on_finish: function(data) {
      participant_id = data.response.ID;
    }
  };

  const encoding = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      encoding_positions = predefinedEncodingPositions[currentSetIndex];
      currentSetIndex = (currentSetIndex + 1) % predefinedEncodingPositions.length;

      let html = '<p style="font-size: 24px;">点の位置を覚えてください</p><div class="grid">';

      for (let i = 0; i < 25; i++) {
        const x = i % 5;
        const y = Math.floor(i / 5);

        html += "<div class='cell'>";
        if (encoding_positions.some(p => p[0] === x && p[1] === y)) {
          html += "<div class='circle'></div>";
        }
        html += "</div>";
      }

      html += "</div>";
      return html;
    },
    choices: "NO_KEYS",
    trial_duration: 3000,
    data: {
      task: "encoding",
      participant_id: function() {
        return participant_id;
      }
    }
  };

  const distraction = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      let html = '<p style="font-size: 24px;">Fを押してください</p><div class="grid">';
      for (let i = 0; i < 25; i++) {
        const letter = Math.random() < 0.6 ? "F" : "E";
        html += `<div class="distraction-cell" data-letter="${letter}">${letter}</div>`;
      }
      html += "</div>";
      return html;
    },
    choices: "NO_KEYS",
    trial_duration: 8000,

    on_start: function() {
      fClickCount = 0;
    },

    on_load: function() {
      document.querySelectorAll(".distraction-cell").forEach(cell => {
        cell.addEventListener("click", () => {
          const clickedLetter = cell.dataset.letter;

          if (clickedLetter === "F") {
            fClickCount++;
            cell.textContent = "E";
            cell.dataset.letter = "E";
          }
        });
      });
    },

    on_finish: function(data) {
      data.task = "distraction";
      data.f_click_count = fClickCount;
      data.participant_id = participant_id;
    }
  };

  const rest_20s = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: "",
    choices: "NO_KEYS",
    trial_duration: 500,
    data: {
      task: "rest",
      participant_id: function() {
        return participant_id;
      }
    }
  };

  const retrieval = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      userSelections = [];

      let html = `
        <p style="font-size: 24px;">点はどこにありましたか？</p>
        <div class="grid">
      `;

      for (let i = 0; i < 25; i++) {
        html += `<div class="cell" data-index="${i}"></div>`;
      }

      html += `
        </div>
        <button id="done" disabled>完了</button>
      `;

      return html;
    },
    choices: "NO_KEYS",

    on_load: function() {
      const doneButton = document.getElementById("done");

      document.querySelectorAll(".cell").forEach((cell, i) => {
        cell.addEventListener("click", () => {
          if (cell.querySelector(".circle")) {
            cell.innerHTML = "";
            userSelections = userSelections.filter(x => x !== i);
          } else {
            if (userSelections.length < 3) {
              cell.innerHTML = "<div class='circle'></div>";
              userSelections.push(i);
            }
          }

          doneButton.disabled = (userSelections.length !== 3);
        });
      });

      doneButton.addEventListener("click", () => {
        if (userSelections.length === 3) {
          jsPsych.finishTrial({
            task: "retrieval",
            participant_id: participant_id,
            response: JSON.stringify(userSelections),
            encoding_positions: JSON.stringify(encoding_positions)
          });
        }
      });
    }
  };


  const wait_1s_after_retrieval = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: "",
  choices: "NO_KEYS",
  trial_duration: 1000,
  data: {
    task: "wait_after_retrieval",
    participant_id: function() {
      return participant_id;
    }
  }
};
  
  const debrief = {
    type: jsPsychHtmlButtonResponse,
    stimulus: "終了です。ありがとうございました。",
    choices: ["終了"],
    data: {
      task: "debrief",
      participant_id: function() {
        return participant_id;
      }
    }
  };

  const save_data = {
    type: jsPsychPipe,
    action: "save",
    experiment_id: "8vGt7oHuZjuJ",
    filename: filename,
    data_string: function() {
      return jsPsych.data.get().csv();
    }
  };

  const timeline = [];
  timeline.push(fullscreen);
  timeline.push(form_trial);

  for (let i = 0; i < 5; i++) {
    timeline.push(encoding);
    timeline.push(distraction);
    timeline.push(rest_20s);
    timeline.push(retrieval);
   timeline.push(wait_1s_after_retrieval);
  }

  timeline.push(debrief);
  timeline.push(save_data);

  jsPsych.run(timeline);
</script>
</html>
